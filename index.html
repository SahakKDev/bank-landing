<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="img/icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/index.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <script src="js/main.js" defer></script>
    <title>Bankist</title>
  </head>
  <body>
    <header class="header">
      <nav class="header__nav">
        <a href="#">
          <img src="img/logo.png" alt="Bankist logo" class="header__nav-logo" />
        </a>

        <ul class="header__nav-list">
          <li class="header__nav-list-item">
            <a href="#">Features</a>
          </li>
          <li class="header__nav-list-item">
            <a href="#">Operations</a>
          </li>
          <li class="header__nav-list-item">
            <a href="#">Testimonials</a>
          </li>
          <li class="header__nav-list-item">
            <a href="#" class="btn--open-modal">Open account</a>
          </li>
        </ul>
      </nav>

      <section class="hero">
        <div>
          <h1 class="hero__heading">
            When <span class="highlight">banking</span> meets <br />
            <span class="highlight">minimalist</span>
          </h1>

          <h4 class="hero__subheading">
            A simpler banking experience for a simpler life.
          </h4>

          <a href="#" class="btn btn-link">Learn more ↓</a>
        </div>

        <img
          src="img/hero.png"
          class="hero-img"
          alt="Minimal workspace with keyboard, mouse, plant, and a dollar bill representing digital banking and finance"
        />
      </section>
    </header>
  </body>
</html>
